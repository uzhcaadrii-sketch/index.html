<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Car Sensor</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* 🌤️ CIELO */
.sky {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#4facfe, #00c6ff);
}

/* ☁️ NUBES */
.cloud {
    position: absolute;
    background: #fff;
    border-radius: 50px;
    opacity: 0.8;
    animation: moveClouds linear infinite;
}

.cloud::before,
.cloud::after {
    content: "";
    position: absolute;
    background: #fff;
    border-radius: 50%;
}

.cloud1 { width: 120px; height: 60px; top: 10%; left: -150px; animation-duration: 40s; }
.cloud2 { width: 180px; height: 80px; top: 25%; left: -200px; animation-duration: 60s; }
.cloud3 { width: 100px; height: 50px; top: 40%; left: -120px; animation-duration: 50s; }

@keyframes moveClouds {
    from { transform: translateX(0); }
    to { transform: translateX(120vw); }
}

/* 🛣️ CARRETERA */
.road {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 35%;
    background: #2b2b2b;
}

/* Líneas de carretera */
.lines {
    position: absolute;
    width: 200%;
    height: 5px;
    background: repeating-linear-gradient(
        to right,
        white 0 40px,
        transparent 40px 80px
    );
    top: 50%;
    animation: moveLines 1s linear infinite;
}

@keyframes moveLines {
    from { transform: translateX(0); }
    to { transform: translateX(-80px); }
}

/* 🚗 CARRO */
#car {
    position: absolute;
    bottom: 10%;
    left: 0%;
    font-size: 4rem;
    transition: left 0.5s ease, transform 0.2s;
}

/* HUD (info) */
.hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
}

#valor-num {
    font-size: 4rem;
    font-weight: 900;
}

.status {
    font-size: 0.8rem;
    opacity: 0.7;
}

.online { color: #00ff88; }
.offline { color: #ff4444; }

</style>
</head>

<body>

<div class="sky">
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
</div>

<div class="road">
    <div class="lines"></div>
</div>

<div id="car">🚗</div>

<div class="hud">
    <div id="valor-num">--</div>
    <div id="status-text" class="status offline">DESCONECTADO</div>
</div>

<script>
const TOKEN = "c92cc50b-8e1c-415b-b686-6a55d59e906f";

async function pullData() {
    try {
        const response = await fetch(`https://api.tago.io/data?variable=distancia&qty=1`, {
            headers: { 'Device-Token': TOKEN }
        });

        const data = await response.json();

        if (data.status && data.result.length > 0) {
            const val = parseFloat(data.result[0].value);

            const display = document.getElementById('valor-num');
            const status = document.getElementById('status-text');
            const car = document.getElementById('car');

            display.innerText = val.toFixed(0) + " cm";

            // Estado
            status.innerText = "SISTEMA ACTIVO";
            status.className = "status online";

            // Movimiento del carro (0–200 cm ajustable)
            let percent = (val / 200) * 100;
            percent = Math.max(0, Math.min(100, percent));

            car.style.left = percent + "%";

            // efecto cercanía 🚨
            if (val < 15) {
                car.style.transform = "scale(1.2)";
                display.style.color = "#ff4444";
            } else {
                car.style.transform = "scale(1)";
                display.style.color = "#ffffff";
            }
        }

    } catch (e) {
        console.error(e);
    }
}

setInterval(pullData, 1000);
</script>

</body>
</html>
