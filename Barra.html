<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nivel de Sensor</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #161616; padding: 40px; border-radius: 20px; border: 1px solid #222; text-align: center; width: 300px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .valor { font-size: 5rem; font-weight: 900; margin: 0; line-height: 1; }
        .unidad { color: #555; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 20px; }
        
        /* Barra de progreso chata */
        .track { background: #222; height: 15px; border-radius: 10px; width: 100%; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: #2ed573; transition: width 0.4s ease, background 0.4s ease; }
        
        #status { font-size: 0.65rem; margin-top: 20px; color: #333; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div id="dist" class="valor">--</div>
        <div class="unidad">Centímetros</div>
        
        <div class="track">
            <div id="fill"></div>
        </div>

        <div id="status">SISTEMA OFFLINE</div>
    </div>

    <script>
        const TOKEN = "c92cc50b-8e1c-415b-b686-6a55d59e906f";

        async function getData() {
            try {
                const r = await fetch(`https://api.tago.io/data?variable=distancia&qty=1`, {
                    headers: { 'Device-Token': TOKEN }
                });
                const d = await r.json();

                if (d.status && d.result.length > 0) {
                    const v = parseFloat(d.result[0].value);
                    document.getElementById('dist').innerText = v.toFixed(0);
                    
                    const bar = document.getElementById('fill');
                    const status = document.getElementById('status');
                    
                    status.innerText = "SISTEMA ONLINE";
                    status.style.color = "#2ed573";

                    // Cálculo de porcentaje (0 a 100 cm)
                    let p = (v / 100) * 100;
                    if (p > 100) p = 100;
                    bar.style.width = p + "%";

                    // Lógica de colores plana
                    if (v < 10) bar.style.background = "#ff4757"; // Crítico
                    else if (v <= 30) bar.style.background = "#ffa502"; // Medio
                    else bar.style.background = "#2ed573"; // Seguro
                }
            } catch (e) {
                document.getElementById('status').innerText = "ERROR DE RED";
            }
        }

        setInterval(getData, 1000);
    </script>
</body>
</html>
